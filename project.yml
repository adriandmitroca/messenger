name: Messenger
options:
  bundleIdPrefix: com.messenger
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Messenger:
    type: application
    platform: macOS
    sources:
      - Messenger
      - path: messenger-macos-brief.md
        buildPhase: none
      - path: .gitignore
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.messenger.app
        PRODUCT_NAME: Messenger
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Messenger/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Messenger/Resources/Messenger.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
