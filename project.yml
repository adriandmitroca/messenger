name: Pigeon
options:
  bundleIdPrefix: com.pigeon
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Pigeon:
    type: application
    platform: macOS
    sources:
      - Pigeon
      - path: messenger-macos-brief.md
        buildPhase: none
      - path: .gitignore
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pigeon.app
        PRODUCT_NAME: Pigeon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Pigeon/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Pigeon/Resources/Pigeon.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
