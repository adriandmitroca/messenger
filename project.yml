name: Messenger
options:
  bundleIdPrefix: com.messenger
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Messenger:
    type: application
    platform: macOS
    sources:
      - Messenger
      - path: .gitignore
        buildPhase: none
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.messenger.app
        PRODUCT_NAME: Messenger
        MARKETING_VERSION: "0.0.7"
        CURRENT_PROJECT_VERSION: "8"
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Messenger/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Messenger/Resources/Messenger.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          PRODUCT_BUNDLE_IDENTIFIER: com.messenger.app.dev
          PRODUCT_NAME: "Messenger Dev"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
